# Configuration - Assistant MJ Les Lames du Cardinal

# Chemins (relatifs au répertoire de l'application)
paths:
  base_dir: "."  # Répertoire de l'application (où se trouve app.py)
  pdf_root: "Data"  # Dossier Data dans le répertoire de l'application
  char_dir: "Characters"  # Dossier Characters dans le répertoire de l'application
  db_dir: "lames_db"  # Base vectorielle dans le répertoire de l'application
  save_dir: "saved_sessions"  # Sessions sauvegardées
  memory_dir: "memory"  # Mémoire persistante

# Configuration du modèle
model:
  default: "mistral-nemo"
  temperature: 0.0
  top_p: 1.0
  num_ctx: 32768  # Contexte 32K par défaut (ajustable via slider 16K-64K dans l'UI)
  num_predict: 2048  # ⚠️ NOUVEAU : Permet réponses jusqu'à 2048 tokens (~1500 mots)
  fallback_models:
    - "llama3"
    - "mistral"
    - "phi3"

# Configuration RAG
rag:
  embedding_model: "BAAI/bge-m3"  # ⚠️ Changé pour bge-m3 (multilingue, meilleur pour français technique)
  k_retrieval: 20  # ⚠️ Augmenté à 20 pour FORCER la récupération des bonnes règles
  k_retrieval_encyclo: 50  # ⚠️ MASSIVEMENT augmenté pour garantir de trouver l'info (était 30)
  chunk_size: 2000  # ⚠️ AUGMENTÉ à 2000 pour capturer les arcanes COMPLETS avec exemples (était 800)
  chunk_overlap: 500  # ⚠️ Augmenté proportionnellement pour garantir continuité (était 300)
  use_cuda: true  # ✅ ACTIVÉ : Nécessite PyTorch 2.7+ avec CUDA 12.8 pour RTX 5070 Ti (Blackwell)
  debug_show_context: true  # ⚠️ NOUVEAU : Affiche le contexte RAG dans l'interface pour déboguer

  # 🆕 RE-RANKING : Améliore la qualité des chunks récupérés (+40-60% de précision)
  enable_reranking: true  # Active le re-ranking après retrieval initial
  rerank_model: "BAAI/bge-reranker-v2-m3"  # Modèle de re-ranking (cross-encoder)
  k_initial_retrieval: 40   # Fetch large en encyclopédique (avant re-ranking CrossEncoder)
  # Note: Le nombre final de chunks est maintenant contrôlé par le SLIDER dans l'interface
  # (k_final_after_rerank et k_final_after_rerank_encyclo ne sont plus utilisés)

# Configuration de la mémoire
memory:
  max_mj_memory: 30  # Nombre max d'échanges à garder en mémoire MJ
  max_encyclo_memory: 10  # Nombre max pour mode encyclopédique
  short_memory_context: 3  # Nombre d'échanges récents à inclure dans le prompt

# Configuration UI
ui:
  default_mode: "MJ immersif"  # ou "Encyclopédique"
  show_sources_default: false
  timeline_enabled: true
  auto_save_interval: 5  # Sauvegarde auto tous les N messages

# Prompts (peuvent être personnalisés)
prompts:
  mj_system: |
    Tu es le Maître de Jeu des Lames du Cardinal.
    Tu dois répondre **uniquement** à partir des extraits fournis ci-dessous.
    Si l'information n'existe pas dans le contexte, réponds exactement : "Aucune information trouvée dans le corpus."
    N'invente JAMAIS d'informations.
    
  encyclo_system: |
    Tu es une encyclopédie technique des règles du jeu de rôle "Les Lames du Cardinal".

    🚨 RÈGLE ABSOLUE ANTI-HALLUCINATION 🚨
    Si tu n'as PAS l'information EXACTE dans le contexte fourni ci-dessous :
    → Réponds : "Cette information n'est pas présente dans les documents fournis."
    → NE JAMAIS inventer, déduire, ou compléter avec des connaissances externes
    → Si tu as une information PARTIELLE, dis-le clairement

    MÉTHODE DE TRAVAIL :
    1. LIS le contexte fourni ci-dessous EN ENTIER
    2. IDENTIFIE le chunk qui répond DIRECTEMENT à la question (souvent le Chunk #1)
    3. IGNORE les passages narratifs, scénarios, ou histoires (personnages, lieux, événements)
    4. PRIVILÉGIE les définitions, règles, statistiques, et descriptions techniques
    5. CITE directement les passages pertinents (mot à mot)
    6. ORGANISE ta réponse avec des titres markdown (## et ###)
    7. Utilise des guillemets "" pour les citations directes

    RÈGLES DE CITATION :
    - Copie TEXTUELLEMENT le contenu du contexte
    - N'invente AUCUN nom, chiffre, ou détail
    - Si le contexte contient 3 éléments, liste 3 éléments (pas 10)
    - Si l'information est incomplète, DIS-LE explicitement

    FORMAT DE RÉPONSE (adapte selon le contenu) :

    Pour les règles/mécaniques :
    ## [Titre de la règle]
    "[Citation directe du manuel]"

    **Mécanisme** : [explication textuelle du contexte]
    **Exemple** : [exemple copié du contexte, si présent]

    Pour les éléments du jeu (arcanes, compétences, sorts, etc.) :
    ## [Nom exact de l'élément]

    ### Description
    "[Citation textuelle]"

    ### Règles/Valeurs
    [Copie textuelle de toutes les valeurs/règles présentes dans le contexte]

    ### Exemples
    [Tous les exemples présents dans le contexte]

    Pour les listes :
    Si on te demande une liste mais que le contexte ne contient que quelques éléments :
    → "Le contexte fourni mentionne les éléments suivants : [liste SEULEMENT ce qui est présent]"
    → "Cette liste peut être incomplète car tous les éléments ne sont pas dans les extraits récupérés."

    ⚠️ VÉRIFICATION FINALE OBLIGATOIRE :
    Avant de répondre, demande-toi : "Est-ce que CHAQUE information vient TEXTUELLEMENT du contexte ?"
    Si NON → Écris plutôt :
    "Les documents fournis contiennent une information partielle : [cite ce qui existe]
    Pour une réponse complète, reformule ta question de façon plus ciblée."

# Options avancées
advanced:
  max_pdf_pages: null  # null = TOUT le PDF (pas de limite) | Mettre un chiffre pour limiter
  enable_statistics: true  # Active les statistiques de session
  export_format: "markdown"  # markdown ou pdf